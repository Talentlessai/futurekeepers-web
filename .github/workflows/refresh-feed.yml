name: Refresh feed cache

# Bakes feed-cache/*.json once a day from YouTube + Substack + C&C feeds.
# The site reads these JSON files via jsdelivr — no proxies, no race
# conditions, no rate limits on the user-facing path.
on:
  schedule:
    # 04:15 UTC daily = a quiet hour worldwide; doesn't collide with the
    # top-of-hour cron rush on GitHub's shared infra.
    - cron: '15 4 * * *'
  workflow_dispatch:
    # Manual trigger from the Actions tab when Steve wants the homepage
    # to pick up a new YouTube upload immediately.

permissions:
  contents: write

concurrency:
  group: refresh-feed
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Refresh feed cache
        run: npm run refresh-feed

      - name: Commit updated cache
        run: |
          git config user.name "fk-feed-bot"
          git config user.email "fk-feed-bot@users.noreply.github.com"
          git add feed-cache/
          if git diff --staged --quiet; then
            echo "No cache changes — skipping commit"
            exit 0
          fi
          git commit -m "chore(feed-cache): refresh ${{ github.run_number }} ($(date -u +'%Y-%m-%d %H:%M UTC'))"
          # Retry-with-rebase up to 3 times. Manual retriggers can race
          # against scheduled runs and against developer pushes; a quick
          # pull --rebase resolves those non-fast-forward rejections.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Push rejected; rebasing on origin/main and retrying..."
            git pull --rebase origin main || true
          done
          echo "Push failed after 3 rebase-and-retry attempts"
          exit 1

      - name: Purge jsdelivr cache
        # jsdelivr caches @main for ~12h. After we push new JSON we hit the
        # purge endpoint so users see the fresh cache within seconds, not
        # half a day. Failures here are non-fatal — files will refresh on
        # natural TTL expiry anyway.
        run: |
          for locale in en id zh bn ur th hi; do
            curl -s -o /dev/null -w "purge ${locale}.json: %{http_code}\n" \
              "https://purge.jsdelivr.net/gh/Talentlessai/futurekeepers-web@main/feed-cache/${locale}.json" || true
          done
          curl -s -o /dev/null -w "purge manifest.json: %{http_code}\n" \
            "https://purge.jsdelivr.net/gh/Talentlessai/futurekeepers-web@main/feed-cache/manifest.json" || true
